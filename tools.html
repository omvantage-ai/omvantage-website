<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omvantage AI - Smart Billing</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: #25D366; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #output { display: none; background: #eee; padding: 15px; margin-top: 20px; white-space: pre-wrap; border-radius: 5px; border-left: 5px solid #25D366; }
    </style>
</head>
<body>

<div class="box">
    <h2>⚡ Omvantage AI - स्मार्ट बिल जनरेटर</h2>
    
    <label>ग्राहक का नाम:</label>
    <input type="text" id="custName" placeholder="जैसे: राशी">
    
    <label>सामान का नाम:</label>
    <input type="text" id="itemName" placeholder="जैसे: Shirt">
    
    <label>मूल्य (₹):</label>
    <input type="number" id="amount" placeholder="जैसे: 500">
    
    <button onclick="processBill()">बिल बनाएं और WhatsApp पर भेजें</button>
    
    <div id="output"></div>
</div>

<script>
function processBill() {
    let name = document.getElementById('custName').value;
    let item = document.getElementById('itemName').value;
    let amt = parseFloat(document.getElementById('amount').value);
    
    if(!name || !item || isNaN(amt)) {
        alert("कृपया सभी जानकारी सही से भरें!");
        return;
    }
    
    let total = (amt * 1.18).toFixed(2);
    
    let message = `--- Omvantage AI Smart Invoice ---\n`;
    message += `ग्राहक का नाम: ${name}\n`;
    message += `कपड़ा/सामान: ${item}\n`;
    message += `कुल राशि (GST सहित): ₹${total}\n\n`;
    message += `पीयूष गारमेंट्स में खरीदारी के लिए धन्यवाद! 🙏`;
    
    // 1. स्क्रीन पर बिल दिखाएं
    let outputDiv = document.getElementById('output');
    outputDiv.style.display = "block";
    outputDiv.innerText = message;
    
    // 2. व्हाट्सएप लिंक बनाएं और खोलें
    let whatsappUrl = "https://wa.me/?text=" + encodeURIComponent(message);
    window.location.href = whatsappUrl;
}
</script>

</body>
</html>
